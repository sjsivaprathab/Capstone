name: AI Defect Prediction Scan

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.java"

jobs:
  defect-scan:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed Java files
        id: changed-files
        run: |
          git fetch origin ${{ github.base_ref }}
          FILES=$(git diff --name-only origin/${{ github.base_ref }} | grep ".java$" || true)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install javalang lightgbm scikit-learn pandas numpy joblib requests

      - name: Download model
        run: |
          curl -L "${{ secrets.MODEL_URL }}" -o java_bug_detector_lightgbm.pkl
          curl -L "${{ secrets.SCALER_URL }}" -o scaler.pkl
      - name: Download defect scan script
        run: |
          curl -L "${{secrets.PYTHONSCRIPTURL}}" -o defect_scan.py
      
      - name: Run AI Defect Scan
        run: |
          python defect_scan.py ${{ steps.changed-files.outputs.files }}
          
       - name: Download comments on PR script
        run: |
          curl -L "${{secrets.PRCommentScriptURL}}" -o pr_comment.py
        
      - name: Comment results on PR
        if: github.event_name == 'pull_request'
        run: |
          python pr_comment.py
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
