name: AI Defect Prediction Scan

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.java"

jobs:
  defect-scan:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed Java files
        id: changed-files
        run: |
          git fetch origin ${{ github.base_ref }}
          FILES=$(git diff --name-only origin/${{ github.base_ref }} | grep ".java$" || true)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: pip install javalang lightgbm scikit-learn pandas numpy joblib requests
      
      - name: Install gdown
        run: pip install gdown
      
      - name: Download model
        run:
          gdown https://drive.google.com/uc?id=1S16yj9B6EcwXMR3q887FA26R2XXuCTk4 -O java_bug_detector_lightgbm.pkl
          gdown https://drive.google.com/uc?id=1ltfvExpjAiucZRv6hTv2WhgAfQBT8h7I -O scaler.pkl
    
        
      - name: Download defect scan script
        run: gdown https://drive.google.com/uc?id=1cdAHCOG8KkM8agHLuIsGPdxCHhn05dKL -O defect_scan.py
      - name: Debug file
        run: |
          ls -l
          head -20 defect_scan.py
      - name: Run AI Defect Scan
        run: |
          python defect_scan.py ${{ steps.changed-files.outputs.files }}

      - name: Download comments on PR script
        run: |
          curl -L "${{ secrets.PRCommentScriptURL }}" -o pr_comment.py

      - name: Comment results on PR
        if: github.event_name == 'pull_request'
        run: |
          python pr_comment.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
